<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Redmine MCP Server pixel R black banner</title>
  <desc id="desc">A black and grayscale README banner with a centered pixel-art R logo and minimal MCP server text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030303"/>
      <stop offset=".62" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffffff" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="30" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="358" rx="29" fill="none" stroke="#252a34" stroke-width="2"/>

  <g opacity=".18">
    <path d="M64 70h1152M64 118h1152M64 166h1152M64 214h1152M64 262h1152" stroke="#ffffff" stroke-width="1"/>
    <path d="M100 48v264M148 48v264M196 48v264M244 48v264M292 48v264M340 48v264M388 48v264M436 48v264M484 48v264M532 48v264M580 48v264M628 48v264M676 48v264M724 48v264M772 48v264M820 48v264M868 48v264M916 48v264M964 48v264M1012 48v264M1060 48v264M1108 48v264M1156 48v264" stroke="#ffffff" stroke-width="1"/>
  </g>

  <g transform="translate(110 78)" filter="url(#glow)">
    <g fill="#f4f4f5" transform="translate(14 0)">
      <rect x="40" y="14" width="21" height="21"/>
      <rect x="66" y="14" width="21" height="21"/>
      <rect x="92" y="14" width="21" height="21"/>
      <rect x="118" y="14" width="21" height="21"/>
      <rect x="144" y="14" width="21" height="21"/>
      <rect x="40" y="40" width="21" height="21"/>
      <rect x="144" y="40" width="21" height="21"/>
      <rect x="40" y="66" width="21" height="21"/>
      <rect x="144" y="66" width="21" height="21"/>
      <rect x="40" y="92" width="21" height="21"/>
      <rect x="66" y="92" width="21" height="21"/>
      <rect x="92" y="92" width="21" height="21"/>
      <rect x="118" y="92" width="21" height="21"/>
      <rect x="40" y="118" width="21" height="21"/>
      <rect x="92" y="118" width="21" height="21"/>
      <rect x="40" y="144" width="21" height="21"/>
      <rect x="118" y="144" width="21" height="21"/>
      <rect x="40" y="170" width="21" height="21"/>
      <rect x="144" y="170" width="21" height="21"/>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="370" y="142" fill="#f8fafc" font-size="56" font-weight="800">Redmine MCP Server</text>
    <text x="372" y="190" fill="#a1a1aa" font-size="28" font-weight="600">for Zed</text>
    <text x="372" y="240" fill="#d4d4d8" font-size="23">Bundled stdio MCP bridge for Redmine.</text>
  </g>

  <g transform="translate(372 276)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">
    <rect x="0" y="0" width="86" height="34" rx="6" fill="#171717" stroke="#3f3f46"/>
    <text x="18" y="23" fill="#e5e7eb">ZED</text>
    <rect x="102" y="0" width="86" height="34" rx="6" fill="#171717" stroke="#3f3f46"/>
    <text x="119" y="23" fill="#d4d4d8">MCP</text>
    <rect x="204" y="0" width="122" height="34" rx="6" fill="#171717" stroke="#3f3f46"/>
    <text x="222" y="23" fill="#a1a1aa">REDMINE</text>
  </g>
</svg>
