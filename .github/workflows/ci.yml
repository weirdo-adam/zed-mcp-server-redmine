name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust components
        run: |
          rustup component add clippy rustfmt
          rustup target add wasm32-wasip2

      - name: Run checks
        run: scripts/check.sh
