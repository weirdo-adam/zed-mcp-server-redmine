name: Bug report
description: Report a reproducible problem with the Zed Redmine MCP extension.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include Redmine API keys, private issue data, internal URLs, or unsanitized logs.
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: zed-version
    attributes:
      label: Zed version
    validations:
      required: true
  - type: input
    id: redmine-version
    attributes:
      label: Redmine version
    validations:
      required: false
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Include only non-secret settings and feature flags.
      render: json
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: text
    validations:
      required: false
